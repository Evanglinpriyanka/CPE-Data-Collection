spring.application.name=securin

# ===============================
# 1. PostgreSQL Connection Settings
# ===============================
# Replace 'localhost:5432' if your port is different
# Replace 'cpe_database' with the name you created in pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/cpe_database
spring.datasource.username=postgres
spring.datasource.password=Angel@123

# Driver for PostgreSQL
spring.datasource.driverClassName=org.postgresql.Driver

# ===============================
# 2. JPA / Hibernate Settings
# ===============================
# Tells Hibernate to create/update tables based on your @Entity
spring.jpa.hibernate.ddl-auto=update

# Tells Hibernate to use PostgreSQL syntax
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Show SQL in the console (helpful for debugging, set to false for speed)
spring.jpa.show-sql=false

# ===============================
# 3. Performance Tuning (Critical for 1.4M rows)
# ===============================
# Speeds up writing thousands of rows by grouping them
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# 4. Initialization Settings
# ===============================
spring.sql.init.mode=always
